<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTF Business Dashboard</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,Helvetica,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#0f172a,#1e3a8a);
            color:white;
        }

        header{
            background:#111827;
            padding:20px;
            text-align:center;
            font-size:30px;
            font-weight:bold;
            box-shadow:0 5px 15px rgba(0,0,0,.4);
        }

        .container{
            width:95%;
            margin:auto;
            margin-top:30px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:20px;
        }

        .card{
            background:white;
            color:#111;
            padding:25px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 10px 20px rgba(0,0,0,.3);
        }

        .card h2{
            color:#2563eb;
            margin-bottom:10px;
        }

        .card h1{
            font-size:35px;
        }

        table{
            width:100%;
            background:white;
            color:black;
            margin-top:40px;
            border-collapse:collapse;
            border-radius:10px;
            overflow:hidden;
        }

        th{
            background:#2563eb;
            color:white;
            padding:15px;
        }

        td{
            padding:12px;
            border-bottom:1px solid #ddd;
        }

        footer{
            text-align:center;
            margin-top:40px;
            padding:20px;
            color:white;
        }
    </style>

</head>

<body>

<header>
📊 MTF BUSINESS DASHBOARD
</header>

<div class="container">

<div class="cards">

<div class="card">
<h2>Total Selling</h2>
<h1>₹0</h1>
</div>

<div class="card">
<h2>Total Clients</h2>
<h1>0</h1>
</div>

<div class="card">
<h2>Total Advisors</h2>
<h1>0</h1>
</div>

<div class="card">
<h2>Total TL</h2>
<h1>0</h1>
</div>

</div>

<table>

<tr>
<th>Client</th>
<th>Advisor</th>
<th>TL</th>
<th>Selling</th>
</tr>

<tr>
<td>Demo Client</td>
<td>Sahil</td>
<td>Meet</td>
<td>₹25,000</td>
</tr>

</table>

<footer>

Designed for Meet Dasani

</footer>

</div>

</body>
</html>
